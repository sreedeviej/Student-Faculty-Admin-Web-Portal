<!DOCTYPE html>
<html>
<head>
    <title>Smart Campus Portal</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background: linear-gradient(to right, #eef2f7, #dfe9f3);
        }

        /* Header */
        .header {
            background: #185a9d;
            color: white;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav a {
            margin-left: 20px;
            color: white;
            text-decoration: none;
            font-size: 14px;
        }

        .nav a:hover {
            text-decoration: underline;
        }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 80px 20px;
        }

        .hero h1 {
            color: #185a9d;
            font-size: 36px;
        }

        .hero p {
            max-width: 500px;
            margin: 15px auto;
            color: #555;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 6px;
            background: #185a9d;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #144a82;
        }

        /* Features */
        .features {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 40px;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            width: 220px;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .card h3 {
            color: #185a9d;
        }

        /* Footer */
        .footer {
            background: #185a9d;
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 30px;
        }
    </style>
</head>

<body>

    <div class="header">
        <h2>Smart Campus</h2>
        <div class="nav">
            <a href="index.html">Home</a>
            <a href="#">Features</a>
            <a href="login.html">Login</a>
        </div>
    </div>

    <div class="hero">
        <h1>Welcome to Smart Campus Portal</h1>
        <p>
            Manage attendance, results and communication in one simple platform.
        </p>

        <button onclick="goToLogin()">Get Started</button>
    </div>

    <div class="features">

        <div class="card">
            <h3>📊 Attendance</h3>
            <p>Track your attendance easily</p>
        </div>

        <div class="card">
            <h3>📄 Results</h3>
            <p>View academic performance</p>
        </div>

        <div class="card">
            <h3>💬 Communication</h3>
            <p>Connect with faculty</p>
        </div>

    </div>

    <div class="footer">
        <p>© 2026 Smart Campus Portal</p>
    </div>

    <script>
        function goToLogin() {
            window.location.href = "login.html";
        }
    </script>

</body>
</html>
