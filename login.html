<!DOCTYPE html>
<html>
<head>
    <title>Login - Smart Campus</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background: linear-gradient(to right, #185a9d, #43cea2);
        }

        /* Header */
        .header {
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 22px;
        }

        /* Login container */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 80vh;
        }

        /* Login box */
        .login-box {
            width: 320px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            text-align: center;
        }

        h3 {
            color: #185a9d;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        input:focus {
            border-color: #185a9d;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #185a9d;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #144a82;
        }

        /* Footer */
        .footer {
            text-align: center;
            color: white;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>

<body>

    <div class="header">
        Smart Campus Portal
    </div>

    <div class="login-container">
        <div class="login-box">
            <h3>Login</h3>

            <input type="text" id="username" placeholder="Enter Username">
            <input type="password" id="password" placeholder="Enter Password">

            <button onclick="login()">Login</button>
        </div>
    </div>

    <div class="footer">
        © 2026 Smart Campus Portal
    </div>

    <script>
        function login() {
            let user = document.getElementById("username").value;
            let pass = document.getElementById("password").value;

            if(user === "" || pass === "") {
                alert("Please enter username and password");
                return;
            }

            // Direct navigation to dashboard (no reload issues)
            window.location.href = "dashboard.html";
        }
    </script>

</body>
</html>
