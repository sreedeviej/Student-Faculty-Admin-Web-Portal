<!DOCTYPE html>
<html>
<head>
    <title>Login - Smart Campus</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #eef2f7;
        }

        /* Header */
        .header {
            background: #185a9d;
            color: white;
            padding: 15px 40px;
            text-align: center;
        }

        /* Login box */
        .login-box {
            width: 300px;
            margin: 80px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 20px;
            background: #185a9d;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 95%;
        }

        button:hover {
            background: #144a82;
        }

        /* Footer */
        .footer {
            text-align: center;
            background: #185a9d;
            color: white;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>

<body>

    <div class="header">
        <h2>Smart Campus Login</h2>
    </div>

    <div class="login-box">
        <h3>Login</h3>

        <input type="text" placeholder="Enter Username">
        <input type="password" placeholder="Enter Password">

        <button onclick="login()">Login</button>
    </div>

    <div class="footer">
        <p>© 2026 Smart Campus Portal</p>
    </div>

    <script>
        function login() {
            alert("Login Successful (Demo)");
            window.location.href = "dashboard.html";
        }
    </script>

</body>
</html>
