<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Campus Portal</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="grain"></div>

    <header class="header page">
        <nav class="nav">
            <div class="logo">Smart <span>Campus</span></div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="dashboard.html">Dashboard</a>
                <a href="attendance.html">Analytics</a>
                <a class="active" href="login.html">Login</a>
            </div>
        </nav>
    </header>

    <main class="main page login-layout">
        <section class="panel login-card">
            <div class="section-head">
                <h2>Student Login</h2>
                <span class="badge good">Secure Access</span>
            </div>
            <p class="muted" style="margin-bottom: 12px;">Enter your details to open your personalized dashboard.</p>

            <form id="loginForm">
                <div style="margin-bottom: 10px;">
                    <label for="username">Username</label>
                    <input class="input" type="text" id="username" placeholder="e.g. sreedhar_24" required>
                </div>
                <div style="margin-bottom: 10px;">
                    <label for="password">Password</label>
                    <input class="input" type="password" id="password" placeholder="Enter your password" required>
                </div>
                <div class="form-row" style="margin-top: 12px;">
                    <button class="btn btn-primary" type="submit">Login</button>
                    <button class="btn btn-soft" type="button" id="guestBtn">Use Demo Login</button>
                </div>
            </form>

            <div id="loginToast" class="toast"></div>
        </section>
    </main>

    <footer class="footer page">Copyright 2026 Smart Campus Portal</footer>

    <script src="portal.js"></script>
    <script>
        const form = document.getElementById("loginForm");
        const toast = document.getElementById("loginToast");
        const guestBtn = document.getElementById("guestBtn");

        function showToast(message, type) {
            toast.className = `toast show ${type}`;
            toast.textContent = message;
        }

        form.addEventListener("submit", function (event) {
            event.preventDefault();
            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value.trim();

            if (!username || !password) {
                showToast("Please enter both username and password.", "warn");
                return;
            }

            saveStudentName(username);
            showToast("Login successful. Redirecting to dashboard...", "ok");
            setTimeout(function () {
                window.location.href = "dashboard.html";
            }, 650);
        });

        guestBtn.addEventListener("click", function () {
            document.getElementById("username").value = "iilm_student";
            document.getElementById("password").value = "demo123";
            showToast("Demo credentials loaded. Click login.", "ok");
        });
    </script>
</body>
</html>
