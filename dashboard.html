<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - Smart Campus</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background: linear-gradient(to right, #eef2f7, #dfe9f3);
        }

        /* Header */
        .header {
            background: #185a9d;
            color: white;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav a {
            margin-left: 20px;
            color: white;
            text-decoration: none;
            font-size: 14px;
        }

        .nav a:hover {
            text-decoration: underline;
        }

        /* Container */
        .container {
            text-align: center;
            padding: 50px 20px;
        }

        h2 {
            color: #185a9d;
            margin-bottom: 30px;
        }

        /* Cards */
        .cards {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            width: 230px;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
            text-align: center;
            transition: 0.3s;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h3 {
            color: #185a9d;
        }

        /* Footer */
        .footer {
            background: #185a9d;
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 40px;
        }
    </style>
</head>

<body>

    <div class="header">
        <h2>Smart Campus</h2>
        <div class="nav">
            <a href="index.html">Home</a>
            <a href="login.html">Logout</a>
        </div>
    </div>

    <div class="container">
        <h2>Dashboard</h2>

        <div class="cards">

            <a href="attendance.html" style="text-decoration:none; color:black;">
                <div class="card">
                    <h3>📊 Attendance</h3>
                    <p>View attendance details</p>
                </div>
            </a>

            <div class="card">
                <h3>📄 Results</h3>
                <p>Check your results</p>
            </div>

            <div class="card">
                <h3>💬 Messages</h3>
                <p>Communicate with faculty</p>
            </div>

        </div>
    </div>

    <div class="footer">
        <p>© 2026 Smart Campus Portal</p>
    </div>

</body>
</html>
