<!DOCTYPE html>
<html>
<head>
    <title>Attendance - Smart Campus</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background: linear-gradient(to right, #eef2f7, #dfe9f3);
        }

        /* Header */
        .header {
            background: #185a9d;
            color: white;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav a {
            margin-left: 20px;
            color: white;
            text-decoration: none;
            font-size: 14px;
        }

        .nav a:hover {
            text-decoration: underline;
        }

        /* Container */
        .container {
            padding: 40px;
            text-align: center;
        }

        h2 {
            color: #185a9d;
            margin-bottom: 20px;
        }

        /* Card */
        .card {
            width: 65%;
            margin: auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            padding: 20px;
        }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: #185a9d;
            color: white;
        }

        tr:hover {
            background: #f5f7fa;
        }

        /* Footer */
        .footer {
            background: #185a9d;
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 40px;
        }
    </style>
</head>

<body>

    <div class="header">
        <h2>Smart Campus</h2>
        <div class="nav">
            <a href="index.html">Home</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="login.html">Logout</a>
        </div>
    </div>

    <div class="container">
        <h2>Attendance Details</h2>

        <div class="card">
            <table>
                <tr>
                    <th>Subject</th>
                    <th>Total Classes</th>
                    <th>Attended</th>
                    <th>Percentage</th>
                </tr>

                <tr>
                    <td>Math</td>
                    <td>40</td>
                    <td>32</td>
                    <td>80%</td>
                </tr>

                <tr>
                    <td>DBMS</td>
                    <td>35</td>
                    <td>30</td>
                    <td>85%</td>
                </tr>

                <tr>
                    <td>OS</td>
                    <td>38</td>
                    <td>28</td>
                    <td>74%</td>
                </tr>

            </table>
        </div>
    </div>

    <div class="footer">
        <p>© 2026 Smart Campus Portal</p>
    </div>

</body>
</html>
